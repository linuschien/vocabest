service_name: "vocabest-core-api"
architecture: "Hexagonal"
adapters:
  - name: "DailyProgressRestControllerAdapter"
    type: "Primary"
    tech: "Spring WebFlux + Reactor Netty"
    stereotype: "<<RestController>>"
    port:
      interface: "DailyProgressRestController"
      layer: "domain.ports.input"
  - name: "ErrorLogRestControllerAdapter"
    type: "Primary"
    tech: "Spring WebFlux + Reactor Netty"
    stereotype: "<<RestController>>"
    port:
