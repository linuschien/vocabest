components:
  schemas:
    OperationStatus:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Operation completed successfully"
    SubmitAnswerRequest:
      type: object
      properties:
        questionId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174003"
        selectedDistractor:
          type: string
          example: "banana"
    SubmitAnswerResponse:
      type: object
      properties:
        isCorrect:
          type: boolean
          example: false
        correctAnswer:
          type: string
          example: "apple"
        explanationRootAffix:
          type: string
          example: "No specific root"
        explanationMnemonic:
          type: string
          example: "A for Apple"
    UserOnboardRequest:
      type: object
      properties:
        email:
          type: string
          example: "user@example.com"
        targetLevel:
          type: string
          example: "JUNIOR_HIGH"
        dailyTargetQuestions:
          type: integer
          example: 20
    UserRequest:
      type: object
      properties:
        email:
          type: string
          example: "user@example.com"
        role:
          type: string
          example: "LEARNER"
        targetLevel:
          type: string
          example: "JUNIOR_HIGH"
        dailyTargetQuestions:
          type: integer
          example: 20
        learningStreak:
          type: integer
          example: 5
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        email:
          type: string
          example: "user@example.com"
        role:
          type: string
          example: "LEARNER"
        targetLevel:
          type: string
          example: "JUNIOR_HIGH"
        dailyTargetQuestions:
          type: integer
          example: 20
        learningStreak:
          type: integer
          example: 5
    DailyProgressRequest:
      type: object
      properties:
        date:
          type: string
          format: date-time
          example: "2026-07-02T00:00:00Z"
        targetQuestions:
          type: integer
          example: 20
        answeredQuestions:
          type: integer
          example: 15
        correctQuestions:
          type: integer
          example: 10
        wrongQuestions:
          type: integer
          example: 5
    DailyProgressResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174001"
        date:
          type: string
          format: date-time
          example: "2026-07-02T00:00:00Z"
        targetQuestions:
          type: integer
          example: 20
        answeredQuestions:
          type: integer
          example: 15
        correctQuestions:
          type: integer
          example: 10
        wrongQuestions:
          type: integer
          example: 5
    WordBankRequest:
      type: object
      properties:
        word:
          type: string
          example: "apple"
        partsOfSpeech:
          type: string
          example: "n."
        chineseTranslation:
          type: string
          example: "蘋果"
        targetLevel:
          type: string
          example: "JUNIOR_HIGH"
        difficultyLevel:
          type: integer
          example: 1
        examFrequency:
          type: integer
          example: 5
    WordBankResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174002"
        word:
          type: string
          example: "apple"
        partsOfSpeech:
          type: string
          example: "n."
        chineseTranslation:
          type: string
          example: "蘋果"
        targetLevel:
          type: string
          example: "JUNIOR_HIGH"
        difficultyLevel:
          type: integer
          example: 1
        examFrequency:
          type: integer
          example: 5
    QuizQuestionRequest:
      type: object
      properties:
        contextualCloze:
          type: string
          example: "I eat an ___ every day."
        chineseTranslation:
          type: string
          example: "我每天吃一顆蘋果。"
        correctAnswer:
          type: string
          example: "apple"
        distractor1:
          type: string
          example: "banana"
        distractor2:
          type: string
          example: "orange"
        distractor3:
          type: string
          example: "grape"
        explanationRootAffix:
          type: string
          example: "No specific root"
        explanationMnemonic:
          type: string
          example: "A for Apple"
    QuizQuestionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174003"
        wordBankId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174002"
        contextualCloze:
          type: string
          example: "I eat an ___ every day."
        chineseTranslation:
          type: string
          example: "我每天吃一顆蘋果。"
        correctAnswer:
          type: string
          example: "apple"
        distractor1:
          type: string
          example: "banana"
        distractor2:
          type: string
          example: "orange"
        distractor3:
          type: string
          example: "grape"
        explanationRootAffix:
          type: string
          example: "No specific root"
        explanationMnemonic:
          type: string
          example: "A for Apple"
    WordMasteryRequest:
      type: object
      properties:
        wordBankId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174002"
        errorWeight:
          type: integer
          example: 2
        nextReviewDate:
          type: string
          format: date-time
          example: "2026-07-05T00:00:00Z"
    WordMasteryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174004"
        userId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        wordBankId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174002"
        errorWeight:
          type: integer
          example: 2
        nextReviewDate:
          type: string
          format: date-time
          example: "2026-07-05T00:00:00Z"
    ErrorEventRequest:
      type: object
      properties:
        quizQuestionId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174003"
        timestamp:
          type: string
          format: date-time
          example: "2026-07-02T10:00:00Z"
        selectedDistractor:
          type: string
          example: "banana"
    ErrorEventResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174005"
        userId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        quizQuestionId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174003"
        timestamp:
          type: string
          format: date-time
          example: "2026-07-02T10:00:00Z"
        selectedDistractor:
          type: string
          example: "banana"

  responses:
    BadRequest:
      description: Bad Request
      content:
