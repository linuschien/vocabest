      operationId: deleteVocabularyWord
      parameters:
        - name: vocabularyWordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

components:
  schemas:
    OperationStatus:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Operation completed successfully"
    UserRequest:
      type: object
      properties:
        targetLevel:
          type: string
          example: "JUNIOR_HIGH"
        learningStreak:
          type: integer
          example: 0
        dailyTargetQuestions:
          type: integer
          example: 20
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        targetLevel:
          type: string
          example: "JUNIOR_HIGH"
        learningStreak:
          type: integer
          example: 0
        dailyTargetQuestions:
          type: integer
          example: 20
    DailyProgressRequest:
      type: object
      properties:
        date:
          type: string
          format: date-time
          example: "2026-06-26T00:00:00Z"
        completedQuestions:
          type: integer
          example: 10
    DailyProgressResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        date:
          type: string
          format: date-time
          example: "2026-06-26T00:00:00Z"
        completedQuestions:
          type: integer
          example: 10
    ErrorLogRequest:
      type: object
      properties:
        wordId:
          type: string
          example: "word-uuid"
        errorWeight:
          type: integer
          example: 1
        nextReviewDate:
          type: string
          format: date-time
          example: "2026-06-27T00:00:00Z"
    ErrorLogResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        wordId:
          type: string
          example: "word-uuid"
        errorWeight:
          type: integer
          example: 1
        nextReviewDate:
          type: string
          format: date-time
          example: "2026-06-27T00:00:00Z"
    ErrorLogActionRequest:
      type: object
      properties:
        reason:
          type: string
          example: "User answered incorrectly"
    QuizQuestionActionRequest:
      type: object
      properties:
        batchSize:
          type: integer
          example: 50
    VocabularyWordActionRequest:
      type: object
      properties:
        sourceUrl:
          type: string
          example: "https://example.com/words.csv"
    QuizQuestionRequest:
      type: object
      properties:
        wordId:
          type: string
          example: "word-uuid"
        contextualCloze:
          type: string
          example: "I usually _____ coffee in the morning."
        translation:
          type: string
          example: "我通常早上喝咖啡。"
        correctOption:
          type: string
          example: "drink"
        distractor1:
          type: string
          example: "eat"
        distractor2:
          type: string
          example: "run"
        distractor3:
          type: string
          example: "sleep"
        explanationRootAffix:
          type: string
          example: "dr- ink"
        explanationMnemonic:
          type: string
          example: "think of a drink"
        targetLevel:
          type: string
          example: "JUNIOR_HIGH"
    QuizQuestionResponse:
      allOf:
        - $ref: '#/components/schemas/QuizQuestionRequest'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              example: "123e4567-e89b-12d3-a456-426614174000"
    VocabularyWordRequest:
      type: object
      properties:
        word:
          type: string
          example: "drink"
        partOfSpeech:
          type: string
          example: "verb"
        translation:
          type: string
          example: "喝"
        level:
          type: string
          example: "JUNIOR_BASIC_1200"
        examFrequency:
          type: integer
          example: 5
    VocabularyWordResponse:
      allOf:
        - $ref: '#/components/schemas/VocabularyWordRequest'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              example: "123e4567-e89b-12d3-a456-426614174000"
