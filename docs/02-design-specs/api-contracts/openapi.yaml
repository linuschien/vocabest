    delete:
      operationId: deleteQuizQuestion
      parameters:
        - name: quizQuestionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

  /vocabulary-words:
    get:
      operationId: listVocabularyWords
      deprecated: true
      description: DEPRECATED_TO_GRAPHQL. Collection queries should be routed to the GraphQL gateway.
      responses:
        "200":
          description: OK
    post:
      operationId: createVocabularyWord
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VocabularyWordRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VocabularyWordResponse'
        "400":
          description: Bad Request

  /vocabulary-words:importBulk:
    post:
      operationId: importBulk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VocabularyWordActionRequest'
      responses:
        "200":
          description: OK
