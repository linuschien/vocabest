spring:
  application:
    name: vocabest-core
  r2dbc:
    url: r2dbc:h2:mem:///vocabest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password: 
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    path: /graphql
logging:
  level:
    org.springframework.data.r2dbc: DEBUG

vocabest:
  admin:
    whitelist: linus.chien@gmail.com
  security:
    mock-user-email: "dev@vocabest.engineer"
